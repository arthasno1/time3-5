<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专注提示音</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
    }

    .card {
      text-align: center;
      background: #16213e;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      min-width: 320px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 24px;
      color: #e94560;
    }

    .timer {
      font-size: 56px;
      font-weight: bold;
      margin: 16px 0;
      font-variant-numeric: tabular-nums;
    }

    .count {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 24px;
    }

    .btn {
      padding: 14px 48px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: .25s;
    }

    .btn-start {
      background: #0f3460;
      color: #fff;
    }

    .btn-start:hover {
      background: #1a5276;
    }

    .btn-stop {
      background: #e94560;
      color: #fff;
    }

    .btn-stop:hover {
      background: #c0392b;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔔 专注提示音</h1>
    <div class="timer" id="timerDisplay">--:--</div>
    <div class="count">已提示 <span id="countDisplay">0</span> 次</div>
    <div class="count" style="margin-top:6px;">累计 <span id="totalDisplay">00:00</span></div>
    <button class="btn btn-start" id="actionBtn">开始</button>
    <button class="btn btn-start" id="testBtn" style="margin-left:10px;padding:14px 24px;font-size:14px;">测试</button>
    <div class="status" id="statusText">点击"开始"启动</div>
  </div>

  <script>
    // 状态变量
    let isRunning = false;       // 是否正在运行
    let count = 0;              // 已提示次数
    let timerId = null;         // 倒计时定时器句柄
    let remaining = 0;          // 当前倒计时剩余秒数
    let nextInterval = 0;       // 本次设定的总间隔（秒）
    let totalSeconds = 0;       // 总累计运行秒数
    let totalTimerId = null;    // 累计计时器

    const timerDisplay = document.getElementById('timerDisplay');
    const countDisplay = document.getElementById('countDisplay');
    const totalDisplay = document.getElementById('totalDisplay');
    const testBtn = document.getElementById('testBtn');
    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('statusText');

    // 用 Web Audio API 生成提示音（不需要音频文件）
    function playBeep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      // 随机音调：200-800 Hz
      osc.frequency.value = 200 + Math.random() * 600;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    }

    // 随机 3-5 分钟（180-300 秒）
    function randomInterval() {
      return Math.floor(Math.random() * 121) + 180; // 180~300
    }

    // 格式化 mm:ss
    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    // 更新显示
    function updateUI() {
      timerDisplay.textContent = remaining > 0 ? formatTime(remaining) : '--:--';
      countDisplay.textContent = count;
    }

    // 开始一次新的计时周期
    function startCycle() {
      if (!isRunning) return;
      nextInterval = randomInterval();
      remaining = nextInterval;
      updateUI();

      clearInterval(timerId);
      timerId = setInterval(() => {
        remaining--;
        updateUI();
        if (remaining <= 0) {
          // 播放提示音
          playBeep();
          count++;
          countDisplay.textContent = count;
          // 立刻开始下一轮
          startCycle();
        }
      }, 1000);
    }

    // 开始
    function start() {
      if (isRunning) return;
      isRunning = true;
      count = 0;
      totalSeconds = 0;
      countDisplay.textContent = '0';
      totalDisplay.textContent = '00:00';
      actionBtn.textContent = '停止';
      actionBtn.className = 'btn btn-stop';
      statusText.textContent = '运行中...';

      // 累计计时器，每秒 +1
      totalTimerId = setInterval(() => {
        totalSeconds++;
        const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        const s = String(totalSeconds % 60).padStart(2, '0');
        totalDisplay.textContent = `${m}:${s}`;
      }, 1000);

      startCycle();
    }

    // 停止
    function stop() {
      isRunning = false;
      clearInterval(timerId);
      clearInterval(totalTimerId);
      timerId = null;
      totalTimerId = null;
      remaining = 0;
      timerDisplay.textContent = '--:--';
      actionBtn.textContent = '开始';
      actionBtn.className = 'btn btn-start';
      statusText.textContent = '已停止';
    }

    // 按钮切换
    actionBtn.addEventListener('click', () => {
      isRunning ? stop() : start();
    });

    // 测试按钮 - 立刻播放一声
    testBtn.addEventListener('click', () => {
      playBeep();
      statusText.textContent = '🔊 测试音已播放';
      setTimeout(() => {
        if (isRunning) statusText.textContent = '运行中...';
        else statusText.textContent = '已停止';
      }, 1500);
    });
  </script>
</body>

</html>
